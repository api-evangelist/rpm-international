aid: rpm-international
name: RPM International
description: >-
  RPM International Inc. is a multinational specialty coatings and sealants
  company headquartered in Medina, Ohio, with annual revenues of approximately
  $7.4 billion. RPM operates a portfolio of over 100 leading brands across
  three segments: Consumer (Rust-Oleum, DAP, Zinsser), Construction (Tremco,
  Dryvit, Flowcrete), and Performance Coatings (Carboline, Stonhard, Plasite).
  RPM International does not currently offer a public developer API, but its
  subsidiaries and brands serve the construction, maintenance, and protective
  coatings markets globally.
